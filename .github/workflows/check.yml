name: Check
on:
  pull_request:
  push:
  workflow_dispatch:
permissions:
  contents: read
env:
  INTEGRITY_SHA256: 24192151cde84e9aa753ba9f618db4353e5639dcaf262833173abfa65ce0e724
concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  structural:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Verify integrity bootstrap
        run: |
          actual="$(python3 -c 'import hashlib; print(hashlib.sha256(open("scripts/check-integrity.py", "rb").read()).hexdigest())')"
          test "$actual" = "$INTEGRITY_SHA256" || { echo "integrity bootstrap digest mismatch" >&2; exit 1; }
          python3 scripts/check-integrity.py
      - run: make check
